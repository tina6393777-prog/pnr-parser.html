<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>接送單解析工具</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F5F4F0; --surface: #FFFFFF;
    --border: #E2E0D8; --border-dark: #C8C5BB;
    --text: #1A1916; --text-muted: #6B6860;
    --accent: #2D5A8E; --accent-light: #EBF1F8;
    --tag-bg: #F0EDE6;
  }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 680px; margin: 0 auto; }
  header { margin-bottom: 2rem; }
  .logo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .logo-icon svg { width: 18px; height: 18px; }
  h1 { font-size: 20px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }
  .subtitle { font-size: 13px; color: var(--text-muted); margin-left: 42px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  .card-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 10px; }
  textarea { width: 100%; min-height: 180px; font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.7; border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: var(--text); background: var(--bg); resize: vertical; transition: border-color 0.15s; outline: none; }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text-muted); opacity: 0.7; }
  .btn-row { display: flex; gap: 8px; margin-top: 10px; }
  button { font-family: 'Noto Sans TC', sans-serif; font-size: 13px; font-weight: 500; padding: 9px 20px; border-radius: 8px; border: 1px solid var(--border-dark); cursor: pointer; transition: all 0.15s; outline: none; }
  #parseBtn { background: var(--accent); color: white; border-color: var(--accent); flex: 1; }
  #parseBtn:hover { background: #234878; }
  #clearBtn { background: transparent; color: var(--text-muted); }
  #clearBtn:hover { background: var(--tag-bg); }
  #result { display: none; }
  .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 1rem; }
  .result-header { display: flex; align-items: center; padding: 10px 16px; background: var(--tag-bg); border-bottom: 1px solid var(--border); }
  .result-header-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); }
  .trip-header { background: var(--accent-light); }
  .trip-header .result-header-title { color: var(--accent); }
  .result-body { padding: 16px; }
  .field-row { display: flex; gap: 12px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .field-row:last-child { border-bottom: none; }
  .field-key { color: var(--text-muted); min-width: 100px; flex-shrink: 0; }
  .field-val { color: var(--text); font-weight: 500; word-break: break-all; line-height: 1.6; }
  .error-msg { background: #FEF2F2; border: 1px solid #FCA5A5; border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #B91C1C; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-row">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
          <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
      </div>
      <h1>接送單解析工具</h1>
    </div>
    <p class="subtitle">貼上廠商原始文字，自動擷取欄位供同仁填入系統</p>
  </header>

  <div class="card">
    <div class="card-label">貼上原始文字</div>
    <textarea id="rawInput" placeholder="將廠商提供的接送單原文貼在這裡…

例如：
R/JD3HPF
1CHEN/PINGTSAOMR
1HU/LICHINGMS
EK 367 A 08JAN TPEDXB HK3 2300 -4 0455-5
AUX SUR EK HK1
TPE 08JAN /CDD/EK0367/08JANTPEDXB/TPE NO 335
SEC 1 WENHUA 2ND RD LINKOU DIST NEW TAIPEI CITY 244008
886933001511  PU 19:30
..."></textarea>
    <div class="btn-row">
      <button id="parseBtn" onclick="parseIt()">解析</button>
      <button id="clearBtn" onclick="clearAll()">清除</button>
    </div>
  </div>

  <div id="result"></div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzgEwDjLlBNUdjVnq-SQO50H_wpg4SFipuX04knbqkRExnqJTXUEOxN5zLRxPVgiQ/exec';

async function translateAddresses(trips) {
  const addrs = trips.map(t => t.地址).filter(a => a);
  if (!addrs.length) return trips;

  try {
    const translated = await Promise.all(addrs.map(async (addr) => {
      const resp = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ address: addr })
      });
      const data = await resp.json();
      return data.result || addr;
    }));

    let i = 0;
    return trips.map(t => {
      if (t.地址) { t.地址 = translated[i++] || t.地址; }
      return t;
    });
  } catch(e) {
    console.error('翻譯失敗:', e);
    return trips;
  }
}

async function parseIt() {
  const raw = document.getElementById('rawInput').value.trim();
  if (!raw) return;
  const result = document.getElementById('result');
  const btn = document.getElementById('parseBtn');
  result.style.display = 'none';
  result.innerHTML = '';
  btn.disabled = true;
  btn.textContent = '解析中…';
  try {
    const d = extractData(raw);
    d.接送行程 = await translateAddresses(d.接送行程);
    renderResult(d);
  } catch(e) {
    result.innerHTML = '<div class="error-msg">解析失敗，請確認文字格式後重試。</div>';
    result.style.display = 'block';
  }
  btn.disabled = false;
  btn.textContent = '解析';
}

function extractData(raw) {
  // 先把 "1.EK..." "2.AUX..." 這種編號格式拆開成獨立行
  const expanded = raw.replace(/(\s)(\d+\.(EK|AUX|SSR|TPE|ADDRESS))/g, '\n$2');
  const lines = expanded.split('\n').map(l => l.trim()).filter(l => l);
  // 去掉行首的 "1." "2." 等編號
  const cleanLines = lines.map(l => l.replace(/^\d+\./, '').trim());

  // 訂位代號（R/ 後面第一個空白前的內容）
  const pnrLine = cleanLines.find(l => /^R\//.test(l));
  const 訂位代號 = pnrLine ? pnrLine.replace('R/', '').trim().split(/\s+/)[0] : '';

  // 乘客姓名
  const 乘客 = cleanLines
    .filter(l => /^\d[A-Z]/.test(l))
    .map(l => l.replace(/^\d/, '').replace(/\s*(MR|MRS|MS|MISS|DR)$/i, '').trim());

  // 航班資訊：EK/航班行 + HK行可能分開
  let 航班 = '', 艙等 = '', 總人數 = '', 起飛時間 = '', 抵達時間 = '';

  // 先找包含 HK 的完整航班行（必須以航空公司代碼開頭）
  let flightLine = cleanLines.find(l => /^[A-Z]{2}\s*\d+/.test(l) && /\bHK\d\b/.test(l) && /\d{4}/.test(l));

  if (flightLine) {
    // 傳統格式：EK 367 A 08JAN TPEDXB HK3 2300 -4 0455
    const fm = flightLine.match(/^([A-Z]{2}\s*\d+)/);
    if (fm) 航班 = fm[1].trim();
    const hkm = flightLine.match(/\bHK(\d+)\b/);
    if (hkm) 總人數 = hkm[1];
    const depm = flightLine.match(/\bHK\d+\s+(\d{4})\b/);
    if (depm) 起飛時間 = depm[1];
    const arrm = flightLine.match(/-\d+\s+(\d{4})/);
    if (arrm) 抵達時間 = arrm[1];
    const cm2 = flightLine.match(/(\d+\s+[A-Z])\s+\d{2}[A-Z]{3}/);
    if (cm2) 艙等 = cm2[1].trim();
  } else {
    // 分行格式：EK 367 O 02APR TPEDXB（一行）+ HK1 2305-4 0435-5（另一行）
    const ekLine = cleanLines.find(l => /^[A-Z]{2}\s+\d+\s+[A-Z]\s+\d{2}[A-Z]{3}/.test(l));
    const hkLine = cleanLines.find(l => /^HK\d[\s\-]\d{4}/.test(l));
    if (ekLine) {
      const fm = ekLine.match(/^([A-Z]{2}\s*\d+)/);
      if (fm) 航班 = fm[1].trim();
      const cm2 = ekLine.match(/(\d+\s+[A-Z])\s+\d{2}[A-Z]{3}/);
      if (cm2) 艙等 = cm2[1].trim();
    }
    if (hkLine) {
      const hkm = hkLine.match(/^HK(\d+)/);
      if (hkm) 總人數 = hkm[1];
      const depm = hkLine.match(/^HK\d+\s+(\d{4})/);
      if (depm) 起飛時間 = depm[1];
      const arrm = hkLine.match(/-\d+\s+(\d{4})/);
      if (arrm) 抵達時間 = arrm[1];
    }
  }

  // 行程區塊：依 AUX SUR EK HKn 分割
  const trips = [];
  const auxIdx = [];
  cleanLines.forEach((l, i) => { if (/^AUX\s+SUR\s+EK\s+HK\d/.test(l)) auxIdx.push(i); });

  auxIdx.forEach((si, idx) => {
    const ei = auxIdx[idx + 1] || cleanLines.length;
    const block = cleanLines.slice(si, ei);

    // 行程編號 & 台數
    const auxHkm = block[0].match(/HK(\d+)/);
    const 行程編號 = auxHkm ? parseInt(auxHkm[1]) : idx + 1;
    const 台數 = auxHkm ? auxHkm[1] : '';

    // 地址：只抓 ADDRESS 關鍵字後面的內容，去掉結尾的 TEL xxx
    let 地址 = '';
    const addrLineIdx = cleanLines.findIndex((l, i) => i >= si && /^ADDRESS\b/i.test(l));
    if (addrLineIdx >= 0) {
      const addrLine = cleanLines[addrLineIdx];
      let afterAddr = addrLine.replace(/^ADDRESS[:\s]*/i, '').trim();
      // 去掉結尾 TEL 電話
      afterAddr = afterAddr.replace(/\s+TEL\s+\S+\s*$/i, '').trim();
      地址 = afterAddr || (cleanLines[addrLineIdx + 1] || '');
    }

    // 電話：先從 ADDRESS 行找 TEL 後面的號碼，再從 block 找 886
    let 聯絡電話 = '';
    if (addrLineIdx >= 0) {
      const telM = cleanLines[addrLineIdx].match(/\bTEL\s+([\d]+)/i);
      if (telM) 聯絡電話 = telM[1];
    }
    if (!聯絡電話) {
      const fullText = block.join(' ');
      const phoneM = fullText.match(/\b(886\d{8,})\b/) || fullText.match(/\b(09\d{8})\b/);
      if (phoneM) 聯絡電話 = phoneM[1];
    }

    // 上車時間（支援 PU 19:30 / P/U 1700 / PU1700 格式）
    let 上車時間 = '';
    const puM = fullText.match(/\bP[\s\/]?U\s+(\d{1,2}:\d{2})/) ||
                fullText.match(/\bP[\s\/]?U\s+(\d{4})\b/);
    if (puM) {
      const t = puM[1];
      // 若是 1700 格式，轉成 17:00
      上車時間 = t.includes(':') ? t : t.slice(0,2) + ':' + t.slice(2);
    }

    // 信箱（從整份原文找 SSR CTCE 對應行程）
    let 客戶信箱 = '';
    const allSsrCtce = cleanLines.filter(l => /SSR\s+CTCE/.test(l));
    let ssrLine = allSsrCtce.find(l => new RegExp('SSR\\s+CTCE\\s+\\S+\\s+HK' + 行程編號).test(l));
    if (!ssrLine) ssrLine = allSsrCtce[0];
    if (ssrLine) {
      // 抓 / 後面到 -1 前面的 email 字串
      const emM = ssrLine.match(/\/([A-Z0-9._%+\-]+\/\/[A-Z0-9._%+\-@]+\.[A-Z]{2,})/i);
      if (emM) {
        // 將 // 換成 @，再去掉多餘的 @（保留最後一個 @）
        let email = emM[1].replace('//', '@');
        // 如果有多個 @，只保留最後一個
        const parts = email.split('@');
        if (parts.length > 2) {
          email = parts.slice(0, -1).join('').replace(/@/g, '') + '@' + parts[parts.length - 1];
        }
        客戶信箱 = email;
      }
    }

    trips.push({ 行程編號, 台數, 地址: 地址.trim(), 聯絡電話, 上車時間, 客戶信箱 });
  });

  return { 訂位代號, 乘客, 艙等, 總人數, 航班, 起飛時間, 抵達時間, 接送行程: trips };
}

function renderResult(d) {
  const result = document.getElementById('result');
  const passengers = (d.乘客 || []).join('<br>') || '—';

  let html = '<div class="result-card"><div class="result-header"><span class="result-header-title">基本資訊</span></div><div class="result-body">';
  html += row('訂位代號', d.訂位代號);
  html += '<div class="field-row"><span class="field-key">乘客姓名</span><span class="field-val">' + passengers + '</span></div>';
  html += row('艙等', d.艙等);
  html += row('總人數', d.總人數 ? d.總人數 + ' 人' : '');
  html += row('航班', d.航班);
  html += row('起飛時間', d.起飛時間);
  html += row('抵達時間', d.抵達時間);
  html += '</div></div>';

  (d.接送行程 || []).forEach(trip => {
    html += '<div class="result-card"><div class="result-header trip-header"><span class="result-header-title">行程 ' + trip.行程編號 + '</span></div><div class="result-body">';
    html += row('台數', trip.台數);
    html += row('地址', trip.地址);
    html += row('電話', trip.聯絡電話);
    html += row('上車時間', trip.上車時間);
    html += row('信箱', trip.客戶信箱);
    html += '</div></div>';
  });

  result.innerHTML = html;
  result.style.display = 'block';
}

function row(key, val) {
  return '<div class="field-row"><span class="field-key">' + key + '</span><span class="field-val">' + (val || '—') + '</span></div>';
}

function clearAll() {
  document.getElementById('rawInput').value = '';
  const result = document.getElementById('result');
  result.innerHTML = '';
  result.style.display = 'none';
}
</script>
</body>
</html>
